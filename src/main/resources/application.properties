spring.application.name=monolith-ecommerce
server.port=8080

# ── H2 In-Memory Database ──────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Carrega data.sql após a criação do schema pelo Hibernate
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# ── JWT ────────────────────────────────────────────────────────
# Secret de 256 bits (32 chars mínimo para HS256) — troque em produção
app.jwt.secret=3cFqr9Xv8pNzLmKwEoJbDsYtAhUgRiPl2nVxOzBmQkHyWdCu
# Expiração do token: 24 horas em milissegundos
app.jwt.expiration-ms=86400000
